<table id="support-table" legacy="{{ include.legacy }}">
  <tr>
    <th>&nbsp;</th>
    <th style="text-align:center" legacy>Napture</th>
    <th style="text-align:center" legacy>Bussinga</th>
    <th style="text-align:center">WXV Core</th>
  </tr>
</table>
<script>
  let data = localStorage.getItem('support-data');
  const typeToParam = { n: 'none', p: 'partial', f: 'full' };
  const legacy = {{ include.legacy }};
  function loadTable() {
    data = JSON.parse(data);
    let key = '{{ include.table }}'.split('/');
    let support = (value)=>{
      let type = value.split('-')[0];
      return `<${type==='p'?'details><summary':'span'} ${typeToParam[type]}>${type==='n'?'None':value.split('-')[1]}</${type==='p'?`summary>${value.split('-')[2]}</details>`:'span'}>`;
    };
    let isBaseline = (ver, browser)=>{
      ver = ver.split('.');
      let base = data.baseline[browser].split('.');
      ver.forEach((seg,i)=>{
        if (Number(seg)>Number(base[i])) return false;
      });
      return true;
    };
    document.getElementById('support-table').insertAdjacentHTML('beforeend', Object.keys(data[key[0]][key[1]])
      .map(feat=>`<tr>
  <td>${feat}</td>
  ${Object.keys(data[key[0]][key[1]][feat]).map(browser=>`<td style="text-align:center"${data.legacy.includes(browser)?' legacy':''}>${support(data[key[0]][key[1]][feat][browser])}</td>`).join('')}
</tr>`)
      .join(''));
    let baseline = Object.values(data[key[0]][key[1]]).map(feat=>{
      let browsers = Object.keys(feat);
      if (legacy) browsers = browsers.filter(browser=>!!data.legacy.includes(browser));
      return browsers.map(browser=>isBaseline(feat[browser].split('-')[1]||'99999999', browser)?feat[browser].split('-')[0]:'n');
    }).flat(Infinity);
    document.getElementById('support-table').insertAdjacentHTML('beforebegin', `<div class="baseline">
  ${(baseline.indexOf('f')<0||baseline.indexOf('p')<0)?(baseline.indexOf('p')<0?'<span style="color:var(--green)">✓ Full baseline support</span>':'<span style="color:var(--yellow)">✱ Partial support across baseline</span>'):'<span style="color:var(--red)">⨉ No baseline support</span>'}
</div>`);
  }
  if (!data || Number(localStorage.getItem('support-expire'))<Date.now()) {
    fetch('/support.json')
      .then(res=>res.text())
      .then(res=>{
        data = res;
        localStorage.setItem('support-data', res);
        localStorage.setItem('support-expire', Date.now()+(24*60*60*1000)); /* 1 Day */
        loadTable();
      });
  } else {
    loadTable();
  }
</script>
